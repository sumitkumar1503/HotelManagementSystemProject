{% extends 'common/homebase.html' %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4 sm:px-6 lg:px-8 -mt-8">
    <div class="max-w-md w-full bg-white rounded-2xl shadow-2xl overflow-hidden p-8 sm:p-10">
        <div class="text-center mb-8">
            <div class="mx-auto w-14 h-14 rounded-full bg-emerald-100 flex items-center justify-center mb-4">
                <i class="fa-solid fa-lock text-2xl text-emerald-600"></i>
            </div>
            <h2 class="text-2xl font-extrabold text-gray-900">Set a new password</h2>
            <p class="mt-2 text-sm text-gray-600">
                Resetting password for <span class="font-semibold text-gray-800">{{ reset_user.username }}</span>.
            </p>
        </div>

        {% if messages %}
            {% for message in messages %}
            <div class="mb-4 p-3 rounded-lg text-sm {% if message.tags == 'error' %}bg-red-50 text-red-700 border border-red-200{% else %}bg-emerald-50 text-emerald-700 border border-emerald-200{% endif %}">
                {{ message }}
            </div>
            {% endfor %}
        {% endif %}

        <form method="post" class="space-y-5">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">New Password</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400"><i class="fa-solid fa-lock"></i></div>
                    <input id="id_password1" name="password1" type="password" required
                           class="appearance-none rounded-lg block w-full pl-10 pr-10 px-3 py-3 border border-gray-300 text-gray-900 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 sm:text-sm"
                           placeholder="New password">
                    <button type="button" data-toggle-password="id_password1" title="Show / hide password"
                            class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-emerald-600 transition">
                        <i class="fa-solid fa-eye"></i>
                    </button>
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Confirm Password</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400"><i class="fa-solid fa-lock"></i></div>
                    <input id="id_password2" name="password2" type="password" required
                           class="appearance-none rounded-lg block w-full pl-10 pr-10 px-3 py-3 border border-gray-300 text-gray-900 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 sm:text-sm"
                           placeholder="Re-enter new password">
                    <button type="button" data-toggle-password="id_password2" title="Show / hide password"
                            class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-emerald-600 transition">
                        <i class="fa-solid fa-eye"></i>
                    </button>
                </div>
            </div>

            <button type="submit"
                    class="w-full flex justify-center py-3 px-4 text-sm font-bold rounded-lg text-white bg-emerald-600 hover:bg-emerald-700 shadow-md transition">
                Reset Password
            </button>
        </form>

        <div class="mt-6 text-center">
            <a href="{% url 'login' %}" class="text-sm text-gray-500 hover:text-indigo-600">
                <i class="fa-solid fa-arrow-left mr-1"></i> Back to login
            </a>
        </div>
    </div>
</div>

<script>
  document.querySelectorAll('[data-toggle-password]').forEach(function (btn) {
    btn.addEventListener('click', function () {
      var input = document.getElementById(btn.getAttribute('data-toggle-password'));
      if (!input) return;
      var icon = btn.querySelector('i');
      if (input.type === 'password') {
        input.type = 'text';
        if (icon) { icon.classList.remove('fa-eye'); icon.classList.add('fa-eye-slash'); }
      } else {
        input.type = 'password';
        if (icon) { icon.classList.remove('fa-eye-slash'); icon.classList.add('fa-eye'); }
      }
    });
  });
</script>
{% endblock %}
