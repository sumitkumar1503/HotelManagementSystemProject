<style>
  /* Responsive tables: turn wide tables into stacked cards on small screens.
     Add class="rtable" to a <table> and data-label="Column" to each <td>. */
  @media (max-width: 767px) {
    table.rtable { min-width: 0 !important; width: 100%; border-collapse: collapse; }
    table.rtable thead {
      position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;
    }
    table.rtable tr {
      display: block; margin-bottom: 0.85rem; border: 1px solid #e5e7eb;
      border-radius: 0.75rem; background: #ffffff;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.06); overflow: hidden;
    }
    table.rtable td {
      display: flex; justify-content: space-between; align-items: center;
      gap: 1rem; text-align: right; padding: 0.6rem 0.85rem;
      border: 0; border-bottom: 1px solid #f3f4f6; white-space: normal !important;
    }
    table.rtable td:last-child { border-bottom: 0; }
    table.rtable td::before {
      content: attr(data-label); font-weight: 600; color: #6b7280;
      font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.03em;
      text-align: left; flex: 0 0 40%;
    }
    table.rtable td:not([data-label])::before { content: ""; }
    table.rtable td.rtable-actions { justify-content: flex-end; }
    table.rtable td.rtable-actions::before { content: ""; flex: 0; }
  }
</style>
